<!DOCTYPE html>
<html>
<head>
  <title>Hurray Video</title>
  <script>
    var videoId = new URLSearchParams(window.location.search).get("v");

    // Try open app
    window.location.href = "hurray://video?v=" + videoId;

    // Fallback to Play Store
    setTimeout(function() {
      window.location.href = "https://play.google.com/store/apps/details?id=com.hurray";
    }, 2000);
  </script>
</head>
<body>
  <h2>Opening video in Hurray...</h2>
</body>
</html>
